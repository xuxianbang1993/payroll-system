<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>薪酬管理系统 · 互动 Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f6f5f1;
      --surface: #ffffff;
      --border: #e9e7e2;
      --border-light: #f2f0ec;
      --text-1: #1c1c1a;
      --text-2: #6b6860;
      --text-3: #a09d95;
      --accent: #ef8b4a;
      --accent-2: #2c5f4a;
      --danger: #b5453a;
      --danger-light: #fdf2f1;
      --radius: 12px;
      --radius-sm: 8px;
      --shadow: 0 12px 30px rgba(35, 30, 20, 0.08);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Noto Sans SC", system-ui, sans-serif;
      background:
        radial-gradient(1200px 400px at 85% -10%, rgba(239, 139, 74, 0.18), transparent 60%),
        radial-gradient(900px 350px at 10% 110%, rgba(44, 95, 74, 0.1), transparent 60%),
        var(--bg);
      color: var(--text-1);
      min-height: 100vh;
      padding: 20px;
    }

    .app {
      max-width: 1240px;
      margin: 0 auto;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(8px);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .topbar {
      height: 62px;
      padding: 0 18px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: linear-gradient(90deg, #fff 0%, #fff8f2 100%);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
    }

    .brand-badge {
      width: 24px;
      height: 24px;
      border-radius: 6px;
      display: grid;
      place-items: center;
      background: var(--accent);
      color: white;
      font-size: 12px;
    }

    .search {
      width: 300px;
      padding: 9px 12px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: #fff;
      font-size: 13px;
      outline: none;
      transition: box-shadow 0.2s, border-color 0.2s;
    }

    .search:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(239, 139, 74, 0.18);
    }

    .layout {
      display: grid;
      grid-template-columns: 260px 1fr;
      gap: 14px;
      padding: 14px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .card-hd {
      padding: 12px 14px;
      font-weight: 700;
      background: linear-gradient(180deg, #ffe5cf 0%, #ffeede 100%);
      border-bottom: 1px solid #f3d8bf;
    }

    .panel {
      padding: 12px;
    }

    .field {
      margin-bottom: 12px;
    }

    .label {
      font-size: 12px;
      color: var(--text-3);
      margin-bottom: 6px;
      display: block;
      font-weight: 600;
    }

    .input,
    .select {
      width: 100%;
      padding: 9px 10px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: #fff;
      font-size: 13px;
      color: var(--text-1);
    }

    .checks {
      display: grid;
      gap: 8px;
      margin: 10px 0 14px;
    }

    .check {
      display: flex;
      gap: 8px;
      align-items: center;
      font-size: 13px;
      color: var(--text-2);
    }

    .btn-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    button {
      border: 0;
      border-radius: var(--radius-sm);
      padding: 9px 10px;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.2s, opacity 0.2s;
    }

    button:hover {
      transform: translateY(-1px);
    }

    .btn-primary {
      background: linear-gradient(90deg, #ef8b4a 0%, #f3a76d 100%);
      color: #fff;
      box-shadow: 0 8px 16px rgba(239, 139, 74, 0.35);
    }

    .btn-ghost {
      background: #fff;
      border: 1px solid var(--border);
      color: var(--text-2);
    }

    .main-grid {
      display: grid;
      gap: 14px;
      grid-template-columns: 1fr 1fr;
      align-content: start;
    }

    .kpi-wrap {
      grid-column: 1 / -1;
    }

    .kpis {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      padding: 10px;
    }

    .kpi {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px;
      background: linear-gradient(180deg, #fff 0%, #fcfaf8 100%);
      position: relative;
      overflow: hidden;
    }

    .kpi::after {
      content: "";
      position: absolute;
      inset: auto -60% -80% -60%;
      height: 100px;
      background: radial-gradient(circle, rgba(239, 139, 74, 0.12), transparent 68%);
      pointer-events: none;
    }

    .kpi-label {
      font-size: 12px;
      color: var(--text-3);
      margin-bottom: 6px;
      font-weight: 600;
    }

    .kpi-val {
      font-size: 34px;
      letter-spacing: -1px;
      font-family: "DM Mono", monospace;
      font-weight: 500;
    }

    .kpi-sub {
      margin-top: 4px;
      font-size: 12px;
      color: var(--text-2);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .pill {
      font-size: 11px;
      padding: 2px 7px;
      border-radius: 999px;
      background: #f6ebe4;
      color: #b56d38;
      cursor: pointer;
      user-select: none;
    }

    .pill.active {
      background: #1c1c1a;
      color: #fff;
    }

    .module-icons {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin: 10px 0 12px;
    }

    .mod {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 8px;
      text-align: center;
      font-size: 13px;
      color: var(--text-2);
      background: #fff;
      transition: border-color 0.2s, transform 0.16s, box-shadow 0.2s;
    }

    .mod:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 10px 18px rgba(239, 139, 74, 0.18);
    }

    .employees {
      display: grid;
      gap: 8px;
      margin: 8px 0 12px;
    }

    .emp {
      border: 1px solid var(--border-light);
      border-radius: 10px;
      padding: 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      background: #fff;
      transition: transform 0.16s, border-color 0.2s;
    }

    .emp:hover {
      transform: translateX(4px);
      border-color: var(--accent);
    }

    .emp-name {
      font-weight: 600;
      font-size: 14px;
    }

    .emp-sub {
      font-size: 12px;
      color: var(--text-3);
    }

    .chip {
      font-size: 11px;
      border-radius: 999px;
      padding: 3px 8px;
      background: var(--danger-light);
      color: var(--danger);
    }

    .steps {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      margin-bottom: 12px;
    }

    .step {
      text-align: center;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 4px;
      font-size: 12px;
      color: var(--text-3);
      cursor: pointer;
      background: #fff;
    }

    .step.active {
      color: #fff;
      background: #1c1c1a;
      border-color: #1c1c1a;
    }

    .bar {
      height: 8px;
      border-radius: 999px;
      background: #ece9e3;
      overflow: hidden;
      margin: 6px 0 14px;
    }

    .bar > span {
      display: block;
      height: 100%;
      width: 20%;
      background: linear-gradient(90deg, #ef8b4a, #f2b073);
      transition: width 0.35s;
    }

    .chart {
      margin-top: 6px;
      height: 140px;
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      align-items: end;
      gap: 8px;
      padding: 8px 2px 0;
    }

    .bar-col {
      display: grid;
      gap: 6px;
      justify-items: center;
    }

    .bar-main {
      width: 20px;
      border-radius: 8px 8px 4px 4px;
      background: linear-gradient(180deg, #ef8b4a, #f5b987);
      transition: height 0.3s, filter 0.2s;
    }

    .bar-col:hover .bar-main {
      filter: saturate(1.2) brightness(0.95);
    }

    .bar-label {
      font-size: 11px;
      color: var(--text-3);
    }

    .drawer {
      position: fixed;
      right: 20px;
      top: 90px;
      width: 290px;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
      padding: 14px;
      transform: translateX(360px);
      transition: transform 0.28s ease;
      z-index: 30;
    }

    .drawer.show {
      transform: translateX(0);
    }

    .drawer h4 {
      font-size: 15px;
      margin-bottom: 10px;
    }

    .drawer p {
      font-size: 13px;
      color: var(--text-2);
      margin-bottom: 8px;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%) translateY(24px);
      opacity: 0;
      background: #1c1c1a;
      color: #fff;
      border-radius: 999px;
      padding: 10px 18px;
      font-size: 13px;
      transition: 0.28s;
      z-index: 40;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 980px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .main-grid,
      .kpis {
        grid-template-columns: 1fr;
      }

      .search {
        width: 180px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <span class="brand-badge">元</span>
        <span>薪酬管理系统</span>
      </div>
      <input class="search" placeholder="搜索员工 / 事项 / 凭证" />
      <div style="font-size:13px;color:var(--text-2);">管理员 · xuxianbang</div>
    </header>

    <main class="layout">
      <aside class="card">
        <div class="card-hd">筛选栏</div>
        <div class="panel">
          <div class="field">
            <label class="label">月份</label>
            <select class="select" id="month">
              <option>2026年02月</option>
              <option>2026年01月</option>
              <option>2025年12月</option>
            </select>
          </div>
          <div class="field">
            <label class="label">部门</label>
            <select class="select" id="dept">
              <option value="all">全部门</option>
              <option value="sales">销售</option>
              <option value="ops">运营</option>
              <option value="hr">人事</option>
            </select>
          </div>
          <div class="field">
            <label class="label">状态</label>
            <div class="checks">
              <label class="check"><input type="checkbox" checked data-status="done" /> 已核算</label>
              <label class="check"><input type="checkbox" checked data-status="pending" /> 待处理</label>
              <label class="check"><input type="checkbox" checked data-status="warn" /> 异常条目</label>
            </div>
          </div>
          <div class="btn-row">
            <button class="btn-ghost" id="reset">重置</button>
            <button class="btn-primary" id="apply">应用筛选</button>
          </div>
        </div>
      </aside>

      <section class="main-grid">
        <div class="card kpi-wrap">
          <div class="card-hd">核心指标</div>
          <div class="kpis">
            <article class="kpi">
              <div class="kpi-label">在职人数</div>
              <div class="kpi-val" data-target="1245">0</div>
              <div class="kpi-sub"><span>动态联动</span><span class="pill active" data-pill="people">员工</span></div>
            </article>
            <article class="kpi">
              <div class="kpi-label">本月应发</div>
              <div class="kpi-val" data-target="12350000">0</div>
              <div class="kpi-sub"><span>单位 ¥</span><span class="pill" data-pill="pay">金额</span></div>
            </article>
            <article class="kpi">
              <div class="kpi-label">已完成核算</div>
              <div class="kpi-val" data-target="98">0</div>
              <div class="kpi-sub"><span>完成率</span><span class="pill" data-pill="done">已核算</span></div>
            </article>
            <article class="kpi">
              <div class="kpi-label">异常条目</div>
              <div class="kpi-val" data-target="3">0</div>
              <div class="kpi-sub"><span>需复核</span><span class="pill" data-pill="warn">待处理</span></div>
            </article>
          </div>
        </div>

        <article class="card">
          <div class="card-hd">基础设置</div>
          <div class="panel">
            <div class="module-icons">
              <div class="mod">薪资等级</div>
              <div class="mod">税规规则</div>
              <div class="mod">绩效模板</div>
            </div>
            <button class="btn-primary" style="width:100%;">管理设置</button>
          </div>
        </article>

        <article class="card">
          <div class="card-hd">人员管理</div>
          <div class="panel">
            <div class="employees" id="employees"></div>
            <button class="btn-primary" style="width:100%;">查看列表</button>
          </div>
        </article>

        <article class="card">
          <div class="card-hd">薪资核算</div>
          <div class="panel">
            <div class="steps" id="steps">
              <div class="step active">计算订单</div>
              <div class="step">薪资核算</div>
              <div class="step">薪资核算</div>
              <div class="step">会计计算</div>
            </div>
            <div class="label">当月进度</div>
            <div class="bar"><span id="progress"></span></div>
            <button class="btn-primary" id="runCalc" style="width:100%;">开始核算</button>
          </div>
        </article>

        <article class="card">
          <div class="card-hd">数据管理</div>
          <div class="panel">
            <div class="label" style="margin-bottom:2px;">薪资支出趋势</div>
            <div class="chart" id="chart"></div>
            <div style="display:flex;justify-content:flex-end;margin-top:8px;">
              <button class="btn-ghost" style="font-size:12px;">导出数据</button>
            </div>
          </div>
        </article>
      </section>
    </main>
  </div>

  <aside class="drawer" id="drawer">
    <h4 id="drawerName">员工详情</h4>
    <p id="drawerMeta"></p>
    <p>提示：点击“开始核算”后会按筛选条件重算指标，并刷新图表分布。</p>
    <div class="btn-row" style="margin-top:10px;">
      <button class="btn-ghost" id="drawerClose">关闭</button>
      <button class="btn-primary">发起复核</button>
    </div>
  </aside>

  <div class="toast" id="toast"></div>

  <script>
    const baseEmployees = [
      { name: "张雨桐", id: "ID/980001", role: "运营总监", state: "已处理", dept: "ops" },
      { name: "陈屿凡", id: "ID/680902", role: "数据管理", state: "待处理", dept: "sales" },
      { name: "刘骁", id: "ID/680905", role: "导师", state: "待处理", dept: "hr" }
    ];

    const chartSeed = [62, 78, 86, 94, 88, 92];
    const state = {
      step: 0,
      dept: "all",
      status: new Set(["done", "pending", "warn"])
    };

    const employeesEl = document.getElementById("employees");
    const chartEl = document.getElementById("chart");
    const progressEl = document.getElementById("progress");
    const toast = document.getElementById("toast");
    const drawer = document.getElementById("drawer");
    const drawerName = document.getElementById("drawerName");
    const drawerMeta = document.getElementById("drawerMeta");

    function showToast(text) {
      toast.textContent = text;
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 1400);
    }

    function animateValue(el, target, suffix = "") {
      const start = 0;
      const frames = 28;
      let i = 0;
      const t = setInterval(() => {
        i += 1;
        const val = Math.round(start + (target - start) * (i / frames));
        el.textContent = suffix === "%" ? val + "%" : val.toLocaleString("zh-CN");
        if (i >= frames) clearInterval(t);
      }, 16);
    }

    function renderEmployees() {
      const list = baseEmployees.filter(e => state.dept === "all" || e.dept === state.dept);
      employeesEl.innerHTML = list.map(e => `
        <div class="emp" data-name="${e.name}" data-meta="${e.id} · ${e.role}">
          <div>
            <div class="emp-name">${e.name}</div>
            <div class="emp-sub">${e.id} · ${e.role}</div>
          </div>
          <span class="chip">${e.state}</span>
        </div>
      `).join("");
    }

    function renderChart(multiplier = 1) {
      chartEl.innerHTML = chartSeed.map((v, i) => {
        const h = Math.max(24, Math.round(v * multiplier));
        return `
          <div class="bar-col">
            <div class="bar-main" style="height:${h}px"></div>
            <div class="bar-label">${i + 1}月</div>
          </div>
        `;
      }).join("");
    }

    function recompute() {
      const checked = [...document.querySelectorAll("input[data-status]:checked")].map(i => i.dataset.status);
      state.status = new Set(checked);
      state.dept = document.getElementById("dept").value;
      const kpis = document.querySelectorAll(".kpi-val");
      const people = state.dept === "all" ? 1245 : state.dept === "sales" ? 428 : state.dept === "ops" ? 512 : 305;
      const pay = Math.round((people * 9800) * (0.9 + checked.length * 0.05));
      const done = Math.min(99, 70 + checked.length * 9);
      const warn = Math.max(1, 6 - checked.length);
      animateValue(kpis[0], people);
      animateValue(kpis[1], pay);
      animateValue(kpis[2], done, "%");
      animateValue(kpis[3], warn);
      renderEmployees();
      renderChart(0.76 + checked.length * 0.12);
      showToast("筛选已应用，指标已联动刷新");
    }

    function initKpi() {
      document.querySelectorAll(".kpi-val").forEach((el, idx) => {
        const t = Number(el.dataset.target || 0);
        const suffix = idx === 2 ? "%" : "";
        animateValue(el, t, suffix);
      });
    }

    document.getElementById("apply").addEventListener("click", recompute);
    document.getElementById("reset").addEventListener("click", () => {
      document.querySelectorAll("input[data-status]").forEach(i => i.checked = true);
      document.getElementById("dept").value = "all";
      recompute();
    });

    document.getElementById("steps").addEventListener("click", e => {
      const step = e.target.closest(".step");
      if (!step) return;
      [...document.querySelectorAll(".step")].forEach(s => s.classList.remove("active"));
      step.classList.add("active");
      const idx = [...document.querySelectorAll(".step")].indexOf(step);
      state.step = idx;
      progressEl.style.width = (24 + idx * 24) + "%";
      showToast("已切换到步骤：" + step.textContent);
    });

    employeesEl.addEventListener("click", e => {
      const row = e.target.closest(".emp");
      if (!row) return;
      drawerName.textContent = row.dataset.name;
      drawerMeta.textContent = row.dataset.meta;
      drawer.classList.add("show");
    });

    document.getElementById("drawerClose").addEventListener("click", () => {
      drawer.classList.remove("show");
    });

    document.getElementById("runCalc").addEventListener("click", () => {
      const next = Math.min(100, 35 + state.step * 20 + Math.floor(Math.random() * 20));
      progressEl.style.width = next + "%";
      renderChart(1 + Math.random() * 0.28);
      showToast("核算任务已启动，正在更新结果");
    });

    document.querySelectorAll(".pill").forEach(p => {
      p.addEventListener("click", () => {
        document.querySelectorAll(".pill").forEach(x => x.classList.remove("active"));
        p.classList.add("active");
        showToast("焦点切换到：" + p.textContent);
      });
    });

    renderEmployees();
    renderChart(1);
    initKpi();
    progressEl.style.width = "48%";
  </script>
</body>
</html>
